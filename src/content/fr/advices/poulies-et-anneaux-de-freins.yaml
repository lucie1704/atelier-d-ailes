title: Poulies et anneaux de freins
description: >
  Des drisses de freins dégainées indiquent une usure des poulies. Inspectez régulièrement poulies et anneaux. Si une poulie est usée jusqu'à l'axe, remplacement immédiat obligatoire.  

  Voir photo : poulies usées jusqu’à l’axe
