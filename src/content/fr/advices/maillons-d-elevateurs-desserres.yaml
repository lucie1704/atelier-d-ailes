title: Maillons d’élévateurs désserrés
description: >
  Vérifiez le serrage de vos maillons à chaque vol. Bloquez fermement mais sans forcer et remettez des clips plastiques ou joints toriques si perdus.  

  Voir photo : maillon du bas désserré
