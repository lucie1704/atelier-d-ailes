banner:
  baseline: |
    Contrôle, révision et réparation d'ailes de parapente et paramoteur.
    Une exigence et un savoir-faire au service de votre sécurité.
  heroImage:
    alt: Aile de parapente en révision dans l'atelier
  actions:
    contact: Demander une révision
    services: Voir les services de l'atelier

services:
  title: Les prestations de l’atelier
  subtitle: Un accompagnement complet pour l’entretien, la réparation et la sécurité de vos ailes de parapente et paramoteur.
  items:
    maintenance:
      title: Révision périodique
      description: Contrôle périodique et révision complète de vos ailes de parapente et paramoteur, réalisés dans le respect des procédures et recommandations des constructeurs.
    repair:
      title: Réparation
      description: |
        Accroc, déchirure, suspente ou couture endommagée : chaque aile est évaluée avec soin afin de proposer une réparation adaptée, durable et conforme aux standards de sécurité.
    parachutePacking:
      title: Pliage de parachute de secours
      description: |
        Aération, ventilation et pliage de votre parachute de secours selon les spécifications constructeur, pour garantir un fonctionnement optimal en situation d’urgence.

profile:
  position: Auto-entrepreneur de l’Atelier d’ailes
  quote: |
    Je contrôle des ailes depuis plus de 30 ans. Anciennement basé à Paris dans la boutique de VLD (Vol Libre Diffusion), mon atelier est désormais installé en Seine-et-Marne depuis {yearsSinceCreation} ans où je mets mon expérience à votre service. Passionné par tout ce qui vole, j’entretiens vos ailes de parapente et paramoteur.

experience:
  title: Un parcours au service de vos ailes
  items:
    atelier:
      title: Atelier d’Ailes
      role: Auto-entrepreneur – Seine-et-Marne
      period: 2015 - Aujourd’hui
      description: |
        Contrôle, révision et réparation d’ailes de parapente et paramoteur.
        Chaque aile est prise en charge personnellement, avec une approche rigoureuse et artisanale.
        L’expérience acquise au fil des années permet un diagnostic précis et des interventions adaptées.
    vld:
      title: Vol Libre Diffusion (VLD)
      role: Atelier parapente – Paris
      period: Plus de 20 ans
      description: |
        Contrôle et entretien d’ailes au sein de la boutique VLD à Paris.
        Travail quotidien sur des ailes de différents constructeurs et usages.
        Une longue expérience technique acquise au contact direct des pilotes.

paracheck:
  title: Certifié ParachecK®
  description: >-
    L'atelier est adhérent à la [charte ParachecK®](https://parapente.ffvl.fr/sites/parapente.ffvl.fr/files/Charte%20FFVL%20ParachecK%20V2_03.pdf) de la [FFVL](https://federation.ffvl.fr/), garantissant des révisions conformes aux standards officiels.
  image:
    alt: Certification ParachecK®
  items:
    maintenance:
      title: Révision Périodique ParachecK®
      description: >-
        La [Révision Périodique ParachecK®](https://parapente.ffvl.fr/revision-voiles) est le contrôle le plus complet pour évaluer l'état réel de votre aile : porosité et résistance du tissu, résistance des suspentes, contrôle du calage, inspection visuelle approfondie. Un rapport détaillé vous est remis, établi selon le cahier des charges de la charte.
    security:
      title: Normes et sécurité
      description: >-
        Seule cette révision, exigée par la norme [EN 926-2](https://parapente.ffvl.fr/sites/parapente.ffvl.fr/files/Norme%20CEN%20-%20pr%C3%A9sentation%20EN%20926-2%20cF06%20modif%20AD_0.pdf), vous informe avec certitude de la capacité de votre aile à voler en sécurité à un instant donné. Elle est également recommandée lors de l'achat ou de la vente d'une aile d'occasion.

reviews:
  title: Le travail de l’atelier selon les pilotes
  action: Laisser un avis
  testimonials:
    - name: Thierry G.
      quote: Travail de qualité réalisé par un passionné. J’ai été rassuré de voler sous mon aile réparée par ses soins. Un peu d’attente parfois, mais un travail sérieux que je recommande.
    - name: Henriette H.
      quote: Super contact, travail rigoureux et de qualité. Christophe prend le temps d’expliquer son intervention. Aile solo et parachute de secours révisés en toute confiance.
    - name: Client de l’atelier
      quote: Un savoir-faire et une expertise qui s’appuient sur une longue expérience. Travail minutieux et grande maîtrise. Sans conteste une référence.
